<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>XTND — Detail Page Paradigm Showcase</title>
    <meta name="viewport" content="width=1440" />
    <link rel="stylesheet" href="../colors_and_type.css?v=23" />
    <link rel="stylesheet" href="../components.css?v=23" />
    <style>
      html,
      body,
      #root {
        margin: 0;
      }

      /* Floating paradigm picker — FAB + popover */
      .ps-fab {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 200;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--a-500);
        color: white;
        border: none;
        cursor: pointer;
        display: grid;
        place-items: center;
        box-shadow: 0 4px 16px -2px hsla(0, 0%, 0%, 0.25);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .ps-fab:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 20px -2px hsla(0, 0%, 0%, 0.3);
      }
      .ps-fab[aria-expanded='true'] {
        background: var(--fg-1);
      }

      .ps-popover {
        position: fixed;
        bottom: 80px;
        right: 20px;
        z-index: 200;
        width: 340px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        animation: ps-pop-in 150ms ease-out;
      }
      @keyframes ps-pop-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .ps-popover__title {
        font-size: var(--fs-xs);
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: var(--tracking-caps);
      }
      .ps-popover__group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ps-popover__group-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: var(--tracking-caps);
        padding: 0 8px;
      }
      .ps-popover__btn {
        all: unset;
        cursor: pointer;
        padding: 7px 10px;
        border-radius: var(--radius-md);
        font-size: var(--fs-sm);
        color: var(--fg-2);
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.1s ease;
      }
      .ps-popover__btn:hover {
        background: var(--bg-hover);
        color: var(--fg-1);
      }
      .ps-popover__btn[aria-selected='true'] {
        background: var(--a-50);
        color: var(--a-700);
        font-weight: 500;
      }
      .ps-popover__btn-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex: none;
      }
      .ps-popover__density {
        display: flex;
        gap: 4px;
        padding-top: 10px;
        border-top: 1px solid var(--border-subtle);
      }

      /* Inline side column for paradigm 1A */
      .ps-side-col {
        border-left: 1px solid var(--border-subtle);
        background: var(--bg-surface);
        display: flex;
        flex-direction: column;
        flex: none;
        min-height: 400px;
        position: relative;
      }
      .ps-side-col__resizer {
        position: absolute;
        left: -3px;
        top: 0;
        bottom: 0;
        width: 6px;
        cursor: col-resize;
        z-index: 2;
      }
      .ps-side-col__resizer::before {
        content: '';
        position: absolute;
        left: 2px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: transparent;
        transition: background 0.1s ease;
      }
      .ps-side-col__resizer:hover::before,
      .ps-side-col__resizer.is-dragging::before {
        background: var(--a-300);
      }
      .ps-side-col__tabs {
        display: flex;
        gap: 2px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-subtle);
        flex-wrap: wrap;
      }
      .ps-side-col__tab {
        all: unset;
        padding: 6px 10px;
        font-size: var(--fs-sm);
        color: var(--fg-2);
        cursor: pointer;
        border-radius: var(--radius-md);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .ps-side-col__tab:hover {
        background: var(--bg-hover);
        color: var(--fg-1);
      }
      .ps-side-col__tab[aria-selected='true'] {
        background: var(--a-50);
        color: var(--a-700);
        font-weight: 500;
      }
      .ps-side-col__tab-count {
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        background: var(--n-100);
        color: var(--fg-3);
        padding: 1px 6px;
        border-radius: 8px;
      }
      .ps-side-col__tab[aria-selected='true'] .ps-side-col__tab-count {
        background: var(--a-100);
        color: var(--a-700);
      }
      .ps-side-col__body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .ps-side-col__collapse-btn {
        all: unset;
        cursor: pointer;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: var(--radius-md);
        color: var(--fg-2);
      }
      .ps-side-col__collapse-btn:hover {
        background: var(--bg-hover);
        color: var(--fg-1);
      }

      /* Collapsed side column strip */
      .ps-strip {
        width: 48px;
        flex: none;
        border-left: 1px solid var(--border-subtle);
        background: var(--bg-surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 0;
        gap: 4px;
      }
      .ps-strip__btn {
        all: unset;
        cursor: pointer;
        width: 36px;
        height: 36px;
        border-radius: var(--radius-md);
        display: grid;
        place-items: center;
        color: var(--fg-2);
        position: relative;
      }
      .ps-strip__btn:hover {
        background: var(--bg-hover);
        color: var(--fg-1);
      }
      .ps-strip__count {
        position: absolute;
        top: 2px;
        right: 2px;
        min-width: 14px;
        height: 14px;
        padding: 0 3px;
        background: var(--a-500);
        color: white;
        border-radius: 8px;
        font-size: 9px;
        font-weight: 700;
        display: grid;
        place-items: center;
        border: 2px solid var(--bg-surface);
        font-variant-numeric: tabular-nums;
      }

      /* Workflow bottom sheet */
      .ps-wf-scrim {
        position: fixed;
        inset: 0;
        background: hsla(0, 0%, 0%, 0.2);
        z-index: 90;
        animation: x-scrim-in 140ms ease-out;
      }
      .ps-wf-sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
        border-radius: 12px 12px 0 0;
        box-shadow: 0 -8px 32px -8px hsla(0, 0%, 0%, 0.16);
        padding: 20px 32px 24px;
        z-index: 95;
        animation: x-wf-in 180ms var(--ease-out);
      }

      /* Edit drawer overlay */
      .ps-drawer-scrim {
        position: fixed;
        inset: 0;
        background: hsla(0, 0%, 0%, 0.3);
        z-index: 80;
        animation: x-scrim-in 140ms ease-out;
      }
      .ps-drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 420px;
        background: var(--bg-surface);
        border-left: 1px solid var(--border);
        box-shadow: -8px 0 32px -8px hsla(0, 0%, 0%, 0.16);
        z-index: 85;
        display: flex;
        flex-direction: column;
        animation: ps-drawer-in 200ms var(--ease-out);
      }
      @keyframes ps-drawer-in {
        from {
          transform: translateX(100%);
          opacity: 0.8;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .ps-drawer__header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 10;
      }
      .ps-drawer__body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .ps-drawer__footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border-subtle);
        background: var(--n-25);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
    </style>
  </head>

    <script type="text/babel">
      // =====================================================================
      // Paradigm Showcase — all detail page layout paradigms
      // Shared data and components loaded from SharedDetailComponents.jsx
      // InvoiceDetailP1 loaded from InvoiceDetailP1.jsx
      // =====================================================================

      const BILL = {

      // Shared data (FIELD_LABELS, AUDIT_EVENTS, CATEGORY_STYLE, etc.)

      const BILL_LINES = [

        {

          desc: 'Deposition preparation — witness outlines',
          qty: 5.5,

        },

      const SAMPLE_DOCS = [
        {
          name: 'VendorBill_MPC_v2.pdf',
          type: 'pdf',
          size: '318 KB',
          by: 'K. Alvarez',
          at: '2026-04-15',
        },
        {

        {

          at: '2026-04-08',
        },
        {
          name: 'Engagement_Letter_Signed.pdf',
          type: 'pdf',
          size: '221 KB',
          by: 'K. Alvarez',
          at: '2026-01-12',
        },
      ];

      // ---------- Reusable edit patterns ----------------------------------

      // EditableSection: a card that toggles between read and edit mode
      const EditableSection = ({
        title,
        icon,
        editing,
        onEdit,
        onCancel,
        onSave,
        children,
      }) => (
        <section
          style={{
            background: 'var(--bg-surface)',
            border: '1px solid var(--border-subtle)',
            borderRadius: 'var(--radius-lg)',
            overflow: 'hidden',
          }}
        >
          <header
            style={{
              padding: '14px 16px',
              borderBottom: '1px solid var(--border-subtle)',
              display: 'flex',
              alignItems: 'center',
              gap: 8,
            }}
          >
            {icon && (
              <Icon name={icon} size={14} style={{ color: 'var(--fg-2)' }} />
            )}
            <span
              style={{
                fontFamily: 'var(--font-display)',
                fontSize: 'var(--fs-lg)',
              }}
            >
              {title}
            </span>
            <div style={{ flex: 1 }} />
            {editing ? (
              <>
                <Badge variant="info">Editing</Badge>
                <Button variant="ghost" size="sm" onClick={onCancel}>
                  Cancel
                </Button>
              </>
            ) : (
              <Button variant="ghost" size="sm" icon="edit" onClick={onEdit}>
                Edit
              </Button>
            )}
          </header>
          <div style={{ padding: 20 }}>{children}</div>
          {editing && (
            <footer
              style={{
                padding: '12px 16px',
                borderTop: '1px solid var(--border-subtle)',
                background: 'var(--n-25)',
                display: 'flex',
                gap: 8,
                justifyContent: 'flex-end',
              }}
            >
              <Button variant="secondary" onClick={onCancel}>
                Cancel
              </Button>
              <Button variant="accent" icon="check" onClick={onSave}>
                Save Changes
              </Button>
            </footer>
          )}
        </section>
      );

      // EditableField: renders as text in read mode, input in edit mode
      const EditableField = ({
        label,
        value,
        editing,
        onChange,
        type = 'text',
        required,
        options,
      }) => (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div
            style={{
              color: 'var(--fg-3)',
              fontSize: 'var(--fs-xs)',
              textTransform: 'uppercase',
              letterSpacing: 'var(--tracking-caps)',
              fontWeight: 600,
            }}
          >
            {label}
            {required && editing && (
              <span style={{ color: 'var(--danger-500)' }}> *</span>
            )}
          </div>
          {editing ? (
            options ? (
              <div style={{ position: 'relative' }}>
                <select
                  className="x-input"
                  value={value}
                  onChange={(e) => onChange(e.target.value)}
                  style={{
                    paddingRight: 28,
                    appearance: 'none',
                    WebkitAppearance: 'none',
                  }}
                >
                  {options.map((o) => (
                    <option key={o} value={o}>
                      {o}
                    </option>
                  ))}
                </select>
                <span
                  style={{
                    position: 'absolute',
                    right: 10,
                    top: '50%',
                    transform: 'translateY(-50%)',
                    color: 'var(--fg-3)',
                    pointerEvents: 'none',
                  }}
                >
                  <Icon name="caretDown" size={12} />
                </span>
              </div>
            ) : (
              <Input
                value={value}
                onChange={(e) => onChange(e.target.value)}
                type={type}
              />
            )
          ) : (
            <span style={{ fontSize: 'var(--fs-sm)', color: 'var(--fg-1)' }}>
              {value || '—'}
            </span>
          )}
        </div>
      );

      // CRMEditableRow: per-field inline edit for CRM icon+label+value rows.
      // Click the value or pencil icon to edit just that one field.
      const CRMEditableRow = ({
        icon,
        label,
        value,
        displayValue,
        onChange,
        editable = true,
        options,
        inputProps,
      }) => {
        const [editing, setEditing] = React.useState(false);
        const [draft, setDraft] = React.useState(value || '');
        const inputRef = React.useRef(null);
        React.useEffect(() => {
          if (editing && inputRef.current) inputRef.current.focus();
        }, [editing]);
        const startEdit = () => {
          if (!editable) return;
          setDraft(value || '');
          setEditing(true);
        };
        const save = () => {
          if (onChange) onChange(draft);
          setEditing(false);
        };
        const cancel = () => setEditing(false);
        const onKey = (e) => {
          if (e.key === 'Enter') save();
          if (e.key === 'Escape') cancel();
        };

        return (
          <div
            style={{
              display: 'grid',
              gridTemplateColumns: '150px 1fr',
              alignItems: 'center',
              gap: 'var(--sp-group)',
              padding: '6px 0',
              fontSize: 'var(--fs-sm)',
              minHeight: 32,
            }}
          >
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 8,
                color: 'var(--fg-3)',
              }}
            >
              {icon && (
                <Icon
                  name={icon}
                  size={13}
                  style={{ color: 'var(--fg-4)', flex: 'none' }}
                />
              )}
              <span>{label}</span>
            </div>
            <div
              style={{
                minWidth: 0,
                display: 'flex',
                alignItems: 'center',
                gap: 6,
              }}
            >
              {editing ? (
                <div
                  style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: 4,
                    flex: 1,
                  }}
                >
                  {options ? (
                    <select
                      ref={inputRef}
                      className="x-input"
                      value={draft}
                      onChange={(e) => setDraft(e.target.value)}
                      onKeyDown={onKey}
                      style={{
                        height: 28,
                        fontSize: 'var(--fs-sm)',
                        padding: '0 8px',
                        flex: 1,
                      }}
                    >
                      {options.map((o) => (
                        <option key={o.value ?? o} value={o.value ?? o}>
                          {o.label ?? o}
                        </option>
                      ))}
                    </select>
                  ) : (
                    <Input
                      ref={inputRef}
                      value={draft}
                      onChange={(e) => setDraft(e.target.value)}
                      onKeyDown={onKey}
                      style={{ height: 28, fontSize: 'var(--fs-sm)', flex: 1 }}
                      {...inputProps}
                    />
                  )}
                  <button
                    onClick={save}
                    title="Save"
                    style={{
                      all: 'unset',
                      cursor: 'pointer',
                      width: 24,
                      height: 24,
                      display: 'grid',
                      placeItems: 'center',
                      borderRadius: 'var(--radius-sm)',
                      color: 'var(--success-600)',
                    }}
                    onMouseEnter={(e) =>
                      (e.currentTarget.style.background = 'var(--success-50)')
                    }
                    onMouseLeave={(e) =>
                      (e.currentTarget.style.background = 'transparent')
                    }
                  >
                    <Icon name="check" size={12} />
                  </button>
                  <button
                    onClick={cancel}
                    title="Cancel"
                    style={{
                      all: 'unset',
                      cursor: 'pointer',
                      width: 24,
                      height: 24,
                      display: 'grid',
                      placeItems: 'center',
                      borderRadius: 'var(--radius-sm)',
                      color: 'var(--fg-3)',
                    }}
                    onMouseEnter={(e) =>
                      (e.currentTarget.style.background = 'var(--n-100)')
                    }
                    onMouseLeave={(e) =>
                      (e.currentTarget.style.background = 'transparent')
                    }
                  >
                    <Icon name="x" size={12} />
                  </button>
                </div>
              ) : (
                <div
                  style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: 6,
                    flex: 1,
                    minWidth: 0,
                    cursor: editable ? 'pointer' : 'default',
                    padding: '2px 4px',
                    margin: '-2px -4px',
                    borderRadius: 'var(--radius-sm)',
                    transition: 'background 0.1s',
                  }}
                  onClick={startEdit}
                  onMouseEnter={(e) => {
                    if (editable)
                      e.currentTarget.style.background = 'var(--bg-hover)';
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.background = 'transparent';
                  }}
                >
                  <span
                    style={{
                      color: 'var(--fg-1)',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis',
                      whiteSpace: 'nowrap',
                      flex: 1,
                    }}
                  >
                    {displayValue || value || (
                      <span style={{ color: 'var(--fg-3)' }}>—</span>
                    )}
                  </span>
                  {editable && (
                    <Icon
                      name="edit"
                      size={11}
                      style={{
                        color: 'var(--fg-4)',
                        flex: 'none',
                        opacity: 0.5,
                      }}
                    />
                  )}
                </div>
              )}
            </div>
          </div>
        );
      };

      // EditDrawer: a right-slide overlay for multi-field editing
      const EditDrawer = ({ open, onClose, title, onSave, children }) => {
        if (!open) return null;
        return (
          <>
            <div className="ps-drawer-scrim" onClick={onClose} />
            <aside className="ps-drawer">
              <div className="ps-drawer__header">
                <span
                  style={{
                    fontFamily: 'var(--font-display)',
                    fontSize: 'var(--fs-lg)',
                    flex: 1,
                  }}
                >
                  {title}
                </span>
                <IconButton icon="x" onClick={onClose} />
              </div>
              <div className="ps-drawer__body">{children}</div>
              <div className="ps-drawer__footer">
                <Button variant="secondary" onClick={onClose}>

          if (paradigm === 'matter') return 'matters';
          if (['user', 'user-tabs', 'user-crm'].includes(paradigm))
            return 'members';
          if (['role', 'role-tabs'].includes(paradigm)) return 'settings';
          return 'dashboard';
        })();

        const [pickerOpen, setPickerOpen] = React.useState(false);
        const pickerRef = React.useRef(null);

        React.useEffect(() => {
          if (!pickerOpen) return;
          const onDoc = (e) => {
            if (pickerRef.current && !pickerRef.current.contains(e.target))
              setPickerOpen(false);
          };
          const onKey = (e) => {
            if (e.key === 'Escape') setPickerOpen(false);
          };
          document.addEventListener('mousedown', onDoc);
          document.addEventListener('keydown', onKey);
          return () => {
            document.removeEventListener('mousedown', onDoc);
            document.removeEventListener('keydown', onKey);
          };
        }, [pickerOpen]);

        const navGroups = [
          {
            label: 'Paradigm 1 — Tab + Side Column',
            color: 'var(--a-500)',
            items: [
              { value: '1a', label: 'Invoice' },
              { value: '1b', label: 'Invoice (Full Width)' },
              { value: 'matter', label: 'Matter' },
              { value: 'user-tabs', label: 'User' },
              { value: 'role-tabs', label: 'Role' },
            ],
          },
          {
            label: 'Paradigm 2 — Block Stacked',
            color: 'var(--success-500)',
            items: [
              { value: 'invoice-stacked', label: 'Invoice' },
              { value: '2', label: 'Vendor Bill' },
              { value: 'user', label: 'User' },
              { value: 'role', label: 'Role' },
            ],
          },
          {
            label: 'Paradigm 3 — CRM Two-Column',
            color: 'var(--warn-500)',
            items: [
              { value: '3', label: 'Vendor Bill' },
              { value: 'user-crm', label: 'User' },
            ],
          },
        ];

        const currentLabel =
          navGroups.flatMap((g) => g.items).find((i) => i.value === paradigm)
            ?.label || '';

        return (
          <AppShell
            current={sidebarCurrent}
            onNavigate={() => {}}
            currentModuleId={moduleId}
            onPickModule={setModuleId}
            sidebarCollapsed={sidebarCollapsed}
            onToggleSidebar={() => setSidebarCollapsed((v) => !v)}
            onOpenNotifications={() => {}}
            unreadCount={3}
            theme={theme}
            onToggleTheme={() =>
              setTheme((t) => (t === 'dark' ? 'light' : 'dark'))
            }
          >
            {/* Full page content — no bar stealing space */}
            {paradigm === '1a' && <Paradigm1A />}
            {paradigm === '1b' && <Paradigm1B />}
            {paradigm === 'matter' && <MatterDetail />}
            {paradigm === 'invoice-stacked' && <InvoiceStacked />}
            {paradigm === '2' && <Paradigm2 />}
            {paradigm === 'user' && <UserDetail />}
            {paradigm === 'role' && <RoleDetail />}
            {paradigm === '3' && <Paradigm3 />}
            {paradigm === 'user-tabs' && <UserTabsDetail />}
            {paradigm === 'user-crm' && <UserCRMDetail />}
            {paradigm === 'role-tabs' && <RoleTabsDetail />}

            {/* Floating paradigm picker */}
            <div ref={pickerRef}>
              <button
                className="ps-fab"
                onClick={() => setPickerOpen((v) => !v)}
                aria-expanded={pickerOpen}
                title={`Viewing: ${currentLabel} — click to switch`}
              >
                <Icon name="grid" size={20} />
              </button>
              {pickerOpen && (
                <div className="ps-popover">
                  <div className="ps-popover__title">Switch paradigm</div>
                  {navGroups.map((g) => (
                    <div key={g.label} className="ps-popover__group">
                      <div className="ps-popover__group-label">{g.label}</div>
                      {g.items.map((n) => (
                        <button
                          key={n.value}
                          className="ps-popover__btn"
                          aria-selected={paradigm === n.value}
                          onClick={() => {
                            setParadigm(n.value);
                            setPickerOpen(false);
                          }}
                        >
                          <span
                            className="ps-popover__btn-dot"
                            style={{
                              background:
                                paradigm === n.value
                                  ? g.color
                                  : 'var(--border)',
                            }}
                          />
                          {n.label}
                        </button>
                      ))}
                    </div>
                  ))}
                  <div className="ps-popover__density">
                    <Segmented
                      value={density}
                      onChange={setDensity}
                      options={[
                        { value: 'compact', label: 'Compact' },
                        { value: 'default', label: 'Default' },
                        { value: 'comfortable', label: 'Airy' },
                      ]}
                    />
                  </div>
                </div>
              )}
            </div>
          </AppShell>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
